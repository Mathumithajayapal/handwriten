<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sign Up | InkWhisper – Begin Your Botanical Ritual</title>

  <!-- Tailwind + Font Awesome + Google Fonts (exactly matching About page) -->
  <script src="tailwind.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="icon" type="image/jpeg" href="Images\favicon.jpg">


  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            'sans': ['Inter', 'system-ui', 'sans-serif'],
            'script': ['Great Vibes', 'cursive'],
            'serif': ['Playfair Display', 'serif']
          },
          colors: {
            primary: "#4A2E1F",
            accent: "#BF7F3A",
            soft: "#FEF8F0",
            light: "#FFE8D4"
          }
        }
      }
    }
  </script>

  <style>
    /* ========== ENHANCED DARK MODE - EXACT SAME AS ABOUT PAGE ========== */
    * {
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    html.dark body {
      background-color: #1a1410 !important;
    }

    /* Force all text elements to white in dark mode (matching about page) */
    html.dark .card-dark,
    html.dark .signup-card {
      background-color: #2a221c !important;
      border-color: #3d3228 !important;
    }

    html.dark .input-field {
      background-color: #1a1410 !important;
      border-color: #5a4a38 !important;
      color: #FEF8F0 !important;
    }

    html.dark .input-field:focus {
      border-color: #FFCF9A !important;
      outline: none;
    }

    html.dark .input-field::placeholder {
      color: #b8a88c !important;
    }

    html.dark label,
    html.dark .text-primary-dark,
    html.dark .logo-subtext,
    html.dark .signup-subtitle,
    html.dark .terms-text,
    html.dark .or-text,
    html.dark .login-link-text {
      color: #FEF8F0 !important;
    }

    html.dark .divider-line {
      background-color: #5a4a38 !important;
    }

    html.dark .social-btn {
      border-color: #5a4a38 !important;
      background-color: #2a221c !important;
    }

    html.dark .social-btn:hover {
      background-color: #3d3228 !important;
      border-color: #FFCF9A !important;
    }

    html.dark .social-icon i {
      color: #e8dccc !important;
    }

    html.dark .social-btn:hover .social-icon i {
      color: #FFCF9A !important;
    }

    html.dark .accent-link {
      color: #FFCF9A !important;
    }

    html.dark .accent-link:hover {
      color: #FFD89C !important;
    }

    html.dark .top-control-btn {
      background-color: #2a221c !important;
      color: #FEF8F0 !important;
      border-color: #3d3228 !important;
    }

    html.dark .top-control-btn:hover {
      background-color: #3d3228 !important;
    }

    html.dark .checkbox-custom {
      color: #e8dccc !important;
    }

    /* RTL Support */
    html[dir="rtl"] .rtl-flip {
      transform: scaleX(-1);
    }

    html[dir="rtl"] .flex-row-reverse-rtl {
      flex-direction: row-reverse;
    }

    html[dir="rtl"] .social-btn i {
      margin-left: 0.5rem;
      margin-right: 0;
    }

    /* Custom animations - matching about page */
    .floating-leaf {
      animation: floatLeaf 6s ease-in-out infinite;
    }

    @keyframes floatLeaf {
      0% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(-8px) rotate(3deg);
      }

      100% {
        transform: translateY(0px) rotate(0deg);
      }
    }

    /* Input focus ring brand color */
    .input-field:focus {
      border-color: #BF7F3A;
    }

    /* Custom checkbox accent */
    input[type="checkbox"] {
      accent-color: #BF7F3A;
    }

    /* Fully responsive adjustments */
    @media (max-width: 640px) {
      .signup-card {
        padding: 1.5rem !important;
        margin: 0 0.5rem;
      }

      .logo-title {
        font-size: 1.5rem !important;
      }

      .input-field {
        font-size: 0.9rem;
        padding: 0.6rem 1rem;
      }
    }

    @media (max-width: 480px) {
      .signup-card {
        padding: 1.25rem !important;
      }

      .social-btn {
        padding: 0.6rem 0.25rem !important;
      }

      .social-btn i {
        font-size: 1.1rem;
      }
    }

    /* Touch-friendly */
    button,
    a,
    .social-btn {
      touch-action: manipulation;
    }
  </style>
</head>

<body class="bg-[#FEF8F0] font-sans antialiased min-h-screen flex items-center justify-center px-4 py-6 md:py-10">

  <!-- TOP RIGHT CONTROLS - Exactly matching About page navbar buttons -->
  <div class="fixed top-4 right-4 flex items-center gap-3 z-50">
    <!-- Dark Mode Toggle -->
    <button id="darkModeToggle"
      class="top-control-btn flex items-center gap-1.5 px-3 py-2 rounded-full text-sm font-medium bg-[#FFE8D4] dark:bg-[#2a221c] text-[#4A2E1F] dark:text-[#FEF8F0] shadow-md hover:bg-[#FFDDB5] dark:hover:bg-[#3d3228] transition">
      <i id="darkIcon" class="fas fa-moon text-sm"></i>
      <span id="darkLabel">Dark</span>
    </button>

    <!-- RTL Toggle -->
    <button id="rtlToggleBtn"
      class="top-control-btn flex items-center gap-1.5 px-3 py-2 rounded-full text-sm font-medium bg-[#FFE8D4] dark:bg-[#2a221c] text-[#4A2E1F] dark:text-[#FEF8F0] shadow-md hover:bg-[#FFDDB5] dark:hover:bg-[#3d3228] transition">
      <i id="rtlIcon" class="fas fa-globe text-sm"></i>
      <span id="rtlLabel">LTR</span>
    </button>
  </div>

  <!-- Main Container - Fully Responsive -->
  <div class="w-full max-w-md mx-auto">

    <!-- Sign Up Card - matches about page card styling (card-dark class) -->
    <div
      class="signup-card w-full bg-white rounded-2xl shadow-xl border border-[#FFE0B5] dark:border-[#3d3228] p-6 sm:p-7 md:p-8 transition-all">

      <!-- Logo Area - EXACT same as About page navbar logo + botanical essence -->
      <div class="text-center mb-6 md:mb-8">
        <div class="flex items-center justify-center gap-2 group cursor-default mb-2">
              <a href="index.html" class="inline-flex items-center justify-center gap-2 group mb-1">
          <i class="fas fa-feather-alt text-[#BF7F3A] text-2xl md:text-3xl transition-transform group-hover:rotate-3"></i>
          <div class="flex flex-col leading-tight text-left">
            <h1 class="text-[#4A2E1F] dark:text-[#FEF8F0] text-3xl md:text-4xl font-bold tracking-tight" 
                style="font-family: 'Inter', system-ui, sans-serif;">
              InkWhisper
            </h1>
            <span class="text-[#8B694A] dark:text-[#C9BDA8] text-[0.65rem] font-semibold uppercase tracking-wider -mt-0.5">
              botanical essence
            </span>
          </div>
        </a>
        </div>
        <div class="mt-2">
          <p class="text-[#6F523B] dark:text-[#E8DCCC] text-sm md:text-base font-medium signup-subtitle"
            style="font-family: 'Playfair Display', serif;">
            Begin your botanical journey
          </p>
          <div class="w-12 h-0.5 bg-[#D9B574] dark:bg-[#FFCF9A] mx-auto mt-2 rounded-full"></div>
        </div>
      </div>

      <!-- Sign Up Form -->
      <form class="space-y-5" id="signupForm">
        <!-- Full Name -->
        <div>
          <label class="block text-sm font-semibold text-[#4A2E1F] dark:text-[#FEF8F0] mb-1.5 tracking-wide">
            <i class="fas fa-user text-[#BF7F3A] text-xs mr-1"></i> Full Name
          </label>
          <input type="text"
            class="input-field w-full px-4 py-2.5 rounded-xl border border-[#FFE0B5] dark:border-[#5a4a38] bg-[#FEF8F0] dark:bg-[#1a1410] text-[#3E2C1C] dark:text-[#FEF8F0] focus:outline-none focus:ring-2 focus:ring-[#BF7F3A]/50 focus:border-[#BF7F3A] text-sm md:text-base transition"
            placeholder="Elara Wren" id="fullName">
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-[#4A2E1F] dark:text-[#FEF8F0] mb-1.5 tracking-wide">
            <i class="fas fa-envelope text-[#BF7F3A] text-xs mr-1"></i> Email
          </label>
          <input type="email"
            class="input-field w-full px-4 py-2.5 rounded-xl border border-[#FFE0B5] dark:border-[#5a4a38] bg-[#FEF8F0] dark:bg-[#1a1410] text-[#3E2C1C] dark:text-[#FEF8F0] focus:outline-none focus:ring-2 focus:ring-[#BF7F3A]/50 focus:border-[#BF7F3A] text-sm md:text-base transition"
            placeholder="hello@inkwhisper.com" id="email">
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-semibold text-[#4A2E1F] dark:text-[#FEF8F0] mb-1.5 tracking-wide">
            <i class="fas fa-lock text-[#BF7F3A] text-xs mr-1"></i> Password
          </label>
          <input type="password"
            class="input-field w-full px-4 py-2.5 rounded-xl border border-[#FFE0B5] dark:border-[#5a4a38] bg-[#FEF8F0] dark:bg-[#1a1410] text-[#3E2C1C] dark:text-[#FEF8F0] focus:outline-none focus:ring-2 focus:ring-[#BF7F3A]/50 focus:border-[#BF7F3A] text-sm md:text-base transition"
            placeholder="Create a strong password" id="password">
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="block text-sm font-semibold text-[#4A2E1F] dark:text-[#FEF8F0] mb-1.5 tracking-wide">
            <i class="fas fa-check-circle text-[#BF7F3A] text-xs mr-1"></i> Confirm Password
          </label>
          <input type="password"
            class="input-field w-full px-4 py-2.5 rounded-xl border border-[#FFE0B5] dark:border-[#5a4a38] bg-[#FEF8F0] dark:bg-[#1a1410] text-[#3E2C1C] dark:text-[#FEF8F0] focus:outline-none focus:ring-2 focus:ring-[#BF7F3A]/50 focus:border-[#BF7F3A] text-sm md:text-base transition"
            placeholder="Confirm your password" id="confirmPassword">
        </div>

        <!-- Terms & Conditions Checkbox -->
        <label
          class="flex items-center gap-2 text-sm text-[#6F523B] dark:text-[#E8DCCC] cursor-pointer checkbox-custom">
          <input type="checkbox" id="termsCheckbox"
            class="w-4 h-4 rounded border-[#FFE0B5] text-[#BF7F3A] focus:ring-[#BF7F3A] focus:ring-offset-0">
          <span class="terms-text">I agree to the <a href="#"
              class="text-[#BF7F3A] dark:text-[#FFCF9A] hover:underline font-medium accent-link">Terms &
              Conditions</a></span>
        </label>

        <!-- Sign Up Button - matching about page primary button style -->
        <button type="submit"
          class="w-full bg-[#4A2E1F] hover:bg-[#6B422A] dark:bg-[#5a3a28] dark:hover:bg-[#7a4f38] text-white font-semibold py-3 rounded-full transition shadow-md text-sm md:text-base flex items-center justify-center gap-2 group">
          <span>Create Account</span>
          <i class="fas fa-arrow-right text-xs group-hover:translate-x-1 transition-transform rtl-flip"></i>
        </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6 md:my-7">
        <div class="flex-1 h-px bg-[#FFE0B5] dark:bg-[#5a4a38] divider-line"></div>
        <span class="text-xs text-[#8B694A] dark:text-[#C9BDA8] font-medium or-text">OR SIGN UP WITH</span>
        <div class="flex-1 h-px bg-[#FFE0B5] dark:bg-[#5a4a38] divider-line"></div>
      </div>

      <!-- Social Login Buttons - fully responsive, same style as about page social icons -->
      <div class="grid grid-cols-3 gap-2 sm:gap-3">
        <!-- Google -->
        <button
          class="social-btn flex items-center justify-center gap-2 border border-[#FFE0B5] dark:border-[#5a4a38] py-2.5 rounded-full text-sm font-medium bg-white dark:bg-[#2a221c] hover:bg-[#FFF6EA] dark:hover:bg-[#3d3228] transition shadow-sm">
          <i class="fab fa-google text-[#DB4437] text-base social-icon"></i>
          <span class="hidden xs:inline sm:inline text-xs md:text-sm text-[#4A2E1F] dark:text-[#FEF8F0]">Google</span>
        </button>
        <!-- Facebook -->
        <button
          class="social-btn flex items-center justify-center gap-2 border border-[#FFE0B5] dark:border-[#5a4a38] py-2.5 rounded-full text-sm font-medium bg-white dark:bg-[#2a221c] hover:bg-[#FFF6EA] dark:hover:bg-[#3d3228] transition shadow-sm">
          <i class="fab fa-facebook-f text-[#1877F2] text-base social-icon"></i>
          <span class="hidden xs:inline sm:inline text-xs md:text-sm text-[#4A2E1F] dark:text-[#FEF8F0]">Facebook</span>
        </button>
        <!-- Apple -->
        <button
          class="social-btn flex items-center justify-center gap-2 border border-[#FFE0B5] dark:border-[#5a4a38] py-2.5 rounded-full text-sm font-medium bg-white dark:bg-[#2a221c] hover:bg-[#FFF6EA] dark:hover:bg-[#3d3228] transition shadow-sm">
          <i class="fab fa-apple text-black dark:text-white text-base social-icon"></i>
          <span class="hidden xs:inline sm:inline text-xs md:text-sm text-[#4A2E1F] dark:text-[#FEF8F0]">Apple</span>
        </button>
      </div>

      <!-- Login Link -->
      <p class="text-center text-sm text-[#6F523B] dark:text-[#E8DCCC] mt-6 md:mt-7 login-link-text">
        Already have an account?
        <a href="#"
          class="text-[#BF7F3A] dark:text-[#FFCF9A] font-semibold hover:underline ml-1 transition accent-link">
          Login <i class="fas fa-chevron-right text-xs rtl-flip"></i>
        </a>
      </p>
    </div>


  </div>

  <script>
      (function () {
        const html = document.documentElement;

        // ========== DARK MODE (exact same logic as About page) ==========
        const darkToggle = document.getElementById('darkModeToggle');
        const darkIcon = document.getElementById('darkIcon');
        const darkLabel = document.getElementById('darkLabel');

        function updateDarkUI(isDark) {
          const iconClass = isDark ? 'fas fa-sun text-sm' : 'fas fa-moon text-sm';
          const label = isDark ? 'Light' : 'Dark';
          if (darkIcon) darkIcon.className = iconClass;
          if (darkLabel) darkLabel.innerText = label;
        }

        // Check localStorage for saved dark mode (using same key as about page)
        if (localStorage.getItem('inkwhisper_dark') === 'enabled') {
          html.classList.add('dark');
          updateDarkUI(true);
        } else {
          updateDarkUI(false);
        }

        function toggleDark() {
          if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            localStorage.setItem('inkwhisper_dark', 'disabled');
            updateDarkUI(false);
          } else {
            html.classList.add('dark');
            localStorage.setItem('inkwhisper_dark', 'enabled');
            updateDarkUI(true);
          }
        }

        if (darkToggle) darkToggle.addEventListener('click', toggleDark);

        // ========== RTL TOGGLE (exact same as About page) ==========
        const rtlBtn = document.getElementById('rtlToggleBtn');
        const rtlLabelSpan = document.getElementById('rtlLabel');
        const rtlIconSpan = document.getElementById('rtlIcon');

        function setDirection(dir) {
          html.setAttribute('dir', dir);
          localStorage.setItem('inkwhisper_dir', dir);
          const label = dir === 'rtl' ? 'RTL' : 'LTR';
          if (rtlLabelSpan) rtlLabelSpan.innerText = label;
          if (rtlIconSpan) {
            if (dir === 'rtl') {
              rtlIconSpan.classList.add('rtl-flip');
            } else {
              rtlIconSpan.classList.remove('rtl-flip');
            }
          }
          // Flip arrow icons for better RTL experience
          const arrows = document.querySelectorAll('.fa-arrow-right, .fa-chevron-right');
          arrows.forEach(arrow => {
            if (dir === 'rtl') arrow.classList.add('rtl-flip');
            else arrow.classList.remove('rtl-flip');
          });
        }

        const savedDir = localStorage.getItem('inkwhisper_dir');
        setDirection(savedDir === 'rtl' ? 'rtl' : 'ltr');

        function toggleRTL() {
          const currentDir = html.getAttribute('dir');
          setDirection(currentDir === 'rtl' ? 'ltr' : 'rtl');
        }

        if (rtlBtn) rtlBtn.addEventListener('click', toggleRTL);

        // ========== SIGNUP FORM VALIDATION & SUBMIT ==========
        const signupForm = document.getElementById('signupForm');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const termsCheck = document.getElementById('termsCheckbox');

        if (signupForm) {
          signupForm.addEventListener('submit', (e) => {
            e.preventDefault();

            let hasError = false;
            let errorMessage = '';

            // Validate name
            if (!fullNameInput.value.trim()) {
              errorMessage = 'Please enter your full name.';
              hasError = true;
            }
            // Validate email
            else if (!emailInput.value.trim() || !emailInput.value.includes('@')) {
              errorMessage = 'Please enter a valid email address.';
              hasError = true;
            }
            // Validate password (min 6 chars for good measure)
            else if (!passwordInput.value || passwordInput.value.length < 6) {
              errorMessage = 'Password must be at least 6 characters.';
              hasError = true;
            }
            // Validate password match
            else if (passwordInput.value !== confirmInput.value) {
              errorMessage = 'Passwords do not match.';
              hasError = true;
            }
            // Validate terms
            else if (!termsCheck.checked) {
              errorMessage = 'Please agree to the Terms & Conditions.';
              hasError = true;
            }

            if (hasError) {
              alert('✨ ' + errorMessage);
              return;
            }

            // Simulate successful signup
            const btn = signupForm.querySelector('button[type="submit"]');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            btn.disabled = true;

            setTimeout(() => {
              btn.innerHTML = originalHTML;
              btn.disabled = false;
              alert('🌸 Welcome to InkWhisper! Your botanical journey begins now. (Demo signup successful)');
              // In a real app, you would redirect to dashboard or login
              signupForm.reset();
            }, 1200);
          });
        }

        // ========== RESPONSIVE: add xs breakpoint support for showing text on social buttons ==========
        const style = document.createElement('style');
        style.textContent = `
        @media (min-width: 480px) {
          .xs\\:inline {
            display: inline !important;
          }
        }
        @media (max-width: 479px) {
          .xs\\:inline {
            display: none !important;
          }
          .social-btn {
            padding: 0.6rem 0.25rem !important;
          }
          .social-btn i {
            font-size: 1.1rem !important;
          }
        }
        .xs\\:inline {
          display: none;
        }
        /* Ensure floating leaf is visible */
        .floating-leaf {
          will-change: transform;
        }
        /* Smooth RTL alignment for buttons */
        html[dir="rtl"] .social-btn {
          flex-direction: row-reverse;
        }
        html[dir="rtl"] .group-hover\\:translate-x-1:hover {
          transform: translateX(-0.25rem);
        }
      `;
        document.head.appendChild(style);

        // Apply RTL orientation to social buttons dynamically
        function applyRTLButtons() {
          const isRTL = html.getAttribute('dir') === 'rtl';
          const socialBtns = document.querySelectorAll('.social-btn');
          socialBtns.forEach(btn => {
            if (isRTL) {
              btn.style.flexDirection = 'row-reverse';
            } else {
              btn.style.flexDirection = 'row';
            }
          });
        }

        const rtlObserver = new MutationObserver(() => {
          applyRTLButtons();
        });
        rtlObserver.observe(html, { attributes: true, attributeFilter: ['dir'] });
        applyRTLButtons();

        // Add placeholder animation for inputs on focus (enhanced UX)
        const inputs = document.querySelectorAll('.input-field');
        inputs.forEach(input => {
          input.addEventListener('focus', function () {
            this.parentElement?.classList.add('focused');
          });
          input.addEventListener('blur', function () {
            this.parentElement?.classList.remove('focused');
          });
        });
      })();
  </script>
</body>

</html>
